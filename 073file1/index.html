/* ---- ここから下は描画処理（基本いじらなくてOK） ---- */
const DEFAULT_NAME = "名無しにかわりましてVIPがお送りします";
const esc = s => s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");

function render(p){

  // 本文：HTMLエスケープ → 安価をリンク化

  const idHtml = p.id ? `<span class="res-id">ID:${esc(p.id)}</span>` : "";

  <article class="res${p.op ? " op" : ""}" id="res${p.no}">

    <div class="res-body">${body}</div>
  </article>`;
}
