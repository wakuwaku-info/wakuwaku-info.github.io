<style>
  :root{ --bg:#0c0c0e; --ink:#ece8df; --dim:#8b857a; --gold:#d2b154; --line:rgba(210,177,84,.3); --red:#7c2b25; }
  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{ height:100%; }
  body{
    background:var(--bg); color:var(--ink);
    font-family:"Hiragino Mincho ProN","Yu Mincho",serif;
    min-height:100dvh; display:flex; flex-direction:column;
    overflow-x:hidden; position:relative;
  }
  /* 粒子ノイズ＆ヴィネット */
  body::before{
    content:""; position:fixed; inset:0; pointer-events:none; z-index:2;
    background:radial-gradient(125% 95% at 50% 32%, transparent 66%, rgba(0,0,0,.55) 100%);
  }
  body::after{
    content:""; position:fixed; inset:0; pointer-events:none; z-index:2; opacity:.05;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='120' height='120'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
    mix-blend-mode:screen;
  }
  .wrap{ position:relative; z-index:3; flex:1; display:flex; flex-direction:column;
    align-items:center; justify-content:center; padding:64px 22px 40px; text-align:center; }

  .mark{ font-size:12px; letter-spacing:.5em; color:var(--dim); margin-bottom:26px; text-indent:.5em; }
  h1{ font-size:clamp(58px,17vw,128px); font-weight:600; letter-spacing:.12em; line-height:1;
    text-indent:.12em; position:relative; }
  h1 .a{ display:inline-block; animation:flick 7s steps(1) infinite; }
  @keyframes flick{ 0%,96%,100%{opacity:1} 97%{opacity:.25} 98%{opacity:.9} 99%{opacity:.4} }
  .romaji{ margin-top:16px; font-family:"Helvetica Neue",Arial,sans-serif; font-size:12px;
    letter-spacing:.62em; color:var(--gold); text-indent:.62em; }
  .rule{ width:54px; height:1px; background:var(--line); margin:30px auto; }
  .lead{ font-size:14px; line-height:2.1; color:#b8b2a7; max-width:30em; }
  .lead small{ display:block; color:var(--dim); font-size:12px; margin-top:6px; letter-spacing:.08em; }
  .recruit{ font-size:14px; letter-spacing:.46em; text-indent:.46em; color:#cfcabf;
    margin-top:2px; }

  /* 事件一覧 */
  .records{ margin-top:48px; width:100%; max-width:520px; }
  .rec-h{ font-family:"Helvetica Neue",Arial,sans-serif; font-size:10px; letter-spacing:.5em;
    color:var(--dim); text-align:left; padding-bottom:12px; border-bottom:1px solid rgba(255,255,255,.08); }
  a.case{ display:flex; align-items:center; gap:16px; text-decoration:none; color:inherit;
    padding:20px 6px 18px; border-bottom:1px solid rgba(255,255,255,.07);
    transition:background .25s, padding .25s; }
  a.case:hover{ background:rgba(201,168,74,.05); padding-left:14px; }
  .cno{ font-family:"Helvetica Neue",Arial,sans-serif; font-size:11px; letter-spacing:.18em;
    color:var(--gold); min-width:88px; text-align:left; }
  .ctitle{ flex:1; text-align:left; }
  .ctitle .jp{ font-size:21px; letter-spacing:.14em; }
  .ctitle .sub{ font-size:11.5px; color:var(--dim); margin-top:5px; letter-spacing:.04em;
    font-family:"Helvetica Neue",Arial,sans-serif; }
  .arrow{ color:var(--gold); font-size:18px; opacity:.6; transition:transform .25s,opacity .25s; }
  a.case:hover .arrow{ transform:translateX(4px); opacity:1; }

  .case.locked{ pointer-events:none; opacity:.4; }
  .case.locked .cno,.case.locked .arrow{ color:var(--dim); }
  .case.locked .seal{ font-size:10px; letter-spacing:.3em; color:var(--red); border:1px solid var(--red);
    padding:3px 8px; font-family:"Helvetica Neue",Arial,sans-serif; }

  footer{ position:relative; z-index:3; text-align:center; padding:26px 20px 34px; color:var(--dim);
    font-family:"Helvetica Neue",Arial,sans-serif; font-size:11px; letter-spacing:.12em; }
  footer a{ color:var(--gold); text-decoration:none; }
  footer .org{ display:block; margin-top:8px; color:#4f4b44; letter-spacing:.18em; }
</style>
